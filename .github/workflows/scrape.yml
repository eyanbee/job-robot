name: Update Job Feed
on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:
permissions:
  contents: write
jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: node scraper.js
      - name: Save Data
        run: |
          git config --global user.name 'JobFlow Robot'
          git config --global user.email 'robot@jobflow.ph'
          git add jobs.json weekly-jobs.csv
          git commit -m "🤖 Updated jobs" || exit 0
          git push
